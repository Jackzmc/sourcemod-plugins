on: [push]
jobs:
  build:
    runs-on: debian-latest
    strategy:
      matrix:
        sm-version: [ '1.11.x', '1.12.x', '1.13.x']
    name: Sourcemod v${{ matrix.sm-version }}
    steps:
      - uses: https://git.jackz.me/actions/checkout@v5
      - name: Setup sourcepawn
        uses: https://git.jackz.me/actions/setup-sp@bb7306e551914d48b2d8405dba17ddc46a4a12a2
        with:
          version: ${{ matrix.sm-version }}
      - name: Build Plugins
        env:
          SPCOMP_PATH: spcomp
        run: chmod +x compile_all.sh && ./compile_all.sh
      - name: Upload artifacts
        uses: https://git.jackz.me/actions/upload-artifact@v4
        with:
          name: plugins-${{ matrix.sm-version }}
          path: |
            plugins/*
            scripting/**/*
            data/**/*
            gamedata/*
          compression-level: 8
